name: Build and Deploy
concurrency: build_and_deploy_${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        default: review
        options:
        - development
        #- review
        - test
        #- preproduction
        #- production
      docker-image-tag:
        description: "Docker image tag to deploy (optional)"
        required: true
        type: string
      pull-request-number:
        description: "Pull request number (required for review environment)"
        required: false
        type: string
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
    types: [opened, reopened, synchronize, labeled]

env:
  TERRAFORM_BASE: terraform/application
  HEALTHCHECK_CMD: '' #'healthcheck/all'

jobs:
  changes:
    name: Detect changes
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          docs:
            - 'docs-site/**'
            - 'documentation/**'
          app:
            - '**'
            - '!docs-site/**'
            - '!documentation/**'

  build:
    name: Build
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.app == 'true' }}
    needs: [changes]
    env:
      DOCKER_REPOSITORY: ghcr.io/dfe-digital/education-provider-registry-data
    outputs:
      docker-image-tag: ${{ steps.build-image.outputs.tag }}
    permissions:
      packages: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      name: Checkout

    - name: Build and push docker image
      id: build-image
      uses: DFE-Digital/github-actions/build-docker-image@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        context: .
        docker-repository: ${{ env.DOCKER_REPOSITORY }}
        max-cache: true
        reuse-cache: true
        snyk-token: ${{ secrets.SNYK_TOKEN }}

  test:
    name: Run tests
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.app == 'true' }}
    needs: [changes]
    runs-on: ubuntu-latest

    # This is a skeleton test job
    # It will need to be updated to set the environment and run required tests
    # The steps can be moved to a separate action if preferred

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    # - name: Run tests
    #   shell: bash
    #   run: |
    #     run some tests

  deploy_docs:
    name: Deploy docs site
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.docs == 'true' }}
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v6
      name: Checkout

    - name: Copy documentation pages
      shell: pwsh
      run: ./docs-site/scripts/copy-documentation-pages.ps1

    - uses: ruby/setup-ruby@v1
      name: Set up Ruby
      with:
        ruby-version: '3.3'
        working-directory: docs-site
        bundler-cache: true

    - name: Build Nanoc docs site
      working-directory: docs-site
      run: bundle exec nanoc compile

    - uses: actions/configure-pages@v5
      name: Configure GitHub Pages

    - uses: actions/upload-pages-artifact@v4
      name: Upload GitHub Pages artifact
      with:
        path: docs-site/output

    - uses: actions/deploy-pages@v4
      name: Deploy GitHub Pages
      id: deployment


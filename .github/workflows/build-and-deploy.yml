#        smoke-test: false
##        gcp-wip: ${{ vars.GCP_WIP }}
##        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

  deploy:
    name: Deploy environments
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.app == 'true' }}
    environment:
      name: ${{ matrix.environment }}
      url: ${{ steps.deploy_app.outputs.environment_url }}
    needs: [changes, build, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    strategy:
      max-parallel: 1
      matrix:
        environment: [development,test] #[development,test,preproduction,production]

    steps:
    - name: Deploy app to ${{ matrix.environment }}
      id: deploy_app
      uses: DFE-Digital/github-actions/deploy-to-aks@master
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        environment: ${{ matrix.environment }}
        sha: ${{ needs.build.outputs.docker-image-tag }}
        terraform-base: ${{ env.TERRAFORM_BASE }}
        healthcheck: ${{ env.HEALTHCHECK_CMD }}
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
        smoke-test: false
        gcp-wip: ${{ vars.GCP_WIP }}
        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

  manual_deploy:
    name: Manual deploy
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy_manual.outputs.environment_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    steps:
    - name: Deploy app to ${{ inputs.environment }}
      id: deploy_manual
      uses: DFE-Digital/github-actions/deploy-to-aks@master
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        environment: ${{ inputs.environment }}
        pr-number: ${{ inputs.pull-request-number }}
        sha: ${{ inputs.docker-image-tag }}
        terraform-base: ${{ env.TERRAFORM_BASE }}
        healthcheck: ${{ env.HEALTHCHECK_CMD }}
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
        smoke-test: false
        db-seed: ${{ inputs.environment == 'review' && 'true' || 'false' }}
        gcp-wip: ${{ vars.GCP_WIP }}
        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

